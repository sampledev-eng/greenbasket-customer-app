<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GreenBasket - Login</title>

  <!-- IMPORTANT for GitHub Pages sub-folder hosting -->
  <base href="/greenbasket-customer-app/">

  <!-- Google font -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Nunito',sans-serif}
    body{
      background:url('https://images.unsplash.com/photo-1606788075761-8093cba5e233?auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed;
      background-size:cover;display:flex;justify-content:center;align-items:center;height:100vh;animation:fadeIn 1.2s ease-in}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .login-box{background:rgba(255,255,255,.92);padding:40px;border-radius:20px;width:100%;max-width:400px;
      box-shadow:0 10px 25px rgba(0,0,0,.2);text-align:center}
    .login-box h2{margin-bottom:25px;color:#2e7d32;font-size:28px}
    .login-box input{width:100%;padding:14px 16px;margin-bottom:20px;border:1px solid #ccc;border-radius:12px;font-size:16px;transition:border .3s}
    .login-box input:focus{border-color:#43a047;outline:none}
    .login-box button{background:#43a047;color:#fff;padding:12px 22px;border:none;border-radius:12px;font-size:16px;cursor:pointer;width:100%;transition:background .3s}
    .login-box button:hover{background:#388e3c}
    .footer{margin-top:15px;font-size:14px;color:#666}
    .error-msg{color:#d32f2f;margin-bottom:15px;font-size:14px}
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Welcome to GreenBasket</h2>

    <form id="loginForm">
      <div id="err" class="error-msg" style="display:none;"></div>
      <input id="user" type="text" placeholder="Username" required />
      <input id="pass" type="password" placeholder="Password" required />
      <button type="submit" id="submitBtn">Login</button>
    </form>

    <div class="footer">
      New user? <a href="#" style="color:#2e7d32;text-decoration:none;">Sign up</a>
    </div>
  </div>

  <script>
    const form      = document.getElementById('loginForm');
    const userField = document.getElementById('user');
    const passField = document.getElementById('pass');
    const errBox    = document.getElementById('err');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in…';

      try {
        const response = await fetch('https://greenbasket-backend.onrender.com/auth/login', {
          method: 'POST',
          headers: {'Content-Type':'application/x-www-form-urlencoded'},
          body: new URLSearchParams({
            username: userField.value.trim(),
            password: passField.value
          })
        });

        if (!response.ok) {
          throw new Error('Invalid credentials');
        }

        const data = await response.json();
        // Store token in localStorage (optional)
        localStorage.setItem('access_token', data.access_token);

        alert('Login successful!');
        // Redirect to your app's home page (adjust if needed)
        window.location.href = './home.html';

      } catch (err) {
        errBox.textContent = err.message || 'Login failed';
        errBox.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
